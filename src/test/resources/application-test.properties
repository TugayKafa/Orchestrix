# Test DB — H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT
jwt.secret=dGVzdHNlY3JldGtleXRoYXRpc2xvbmdlbm91Z2hmb3JocyEhIQ==
jwt.expiration-ms=3600000

# Refresh token
refresh-token.expiration-weeks=1

# Token blacklist
token-blacklist.ttl-hours=1

# Cleanup scheduler
cleanup.cron=0 0 3 * * *

# Redis - dummy values for tests
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Google OAuth2 — dummy values for tests
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# GitHub OAuth2 — dummy values for tests
spring.security.oauth2.client.registration.github.client-id=test-client-id
spring.security.oauth2.client.registration.github.client-secret=test-client-secret